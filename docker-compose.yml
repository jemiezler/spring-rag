
name: spring-rag-environment
services:

  postgres:
    image: pgvector/pgvector:pg16

    container_name: spring-ai-rag-postgres

    environment:
      POSTGRES_DB: spring_ai_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

